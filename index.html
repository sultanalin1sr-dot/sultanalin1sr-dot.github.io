<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ماتركس دندون الحقيقي</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0a0a0c;
            color: #00f2fe;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
        }
        body::before {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            background: rgba(0, 242, 254, 0.15);
            border-radius: 50%;
            filter: blur(130px);
            top: 5%;
            left: 10%;
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 20px;
            background: rgba(16, 17, 22, 0.9);
            backdrop-filter: blur(15px);
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.25);
            width: 100%;
            max-width: 500px;
            height: 85vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 20px;
            border-bottom: 1px solid rgba(0, 242, 254, 0.2);
            text-align: center;
        }
        .header h1 {
            color: #ffffff;
            font-size: 1.8rem;
            text-shadow: 0 0 15px #00f2fe;
        }
        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            padding: 12px 16px;
            border-radius: 14px;
            max-width: 80%;
            line-height: 1.5;
            font-size: 0.95rem;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .user-message {
            background: #00f2fe;
            color: #000;
            align-self: flex-start;
            font-weight: 500;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }
        .ai-message {
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.08);
            align-self: flex-end;
        }
        .input-box {
            padding: 15px;
            border-top: 1px solid rgba(0, 242, 254, 0.2);
            display: flex;
            gap: 10px;
        }
        .input-box input {
            flex: 1;
            background: #111;
            border: 1px solid rgba(0, 242, 254, 0.3);
            color: #fff;
            padding: 14px;
            border-radius: 12px;
            outline: none;
            font-size: 0.95rem;
        }
        .input-box input:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 12px rgba(0, 242, 254, 0.3);
        }
        .input-box button {
            background: #00f2fe;
            color: #000;
            border: none;
            padding: 0 22px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>ماترِكس دندون اللامحدود</h1>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message ai-message">تم تدمير كود البغبغاء بنجاح مية بالمية 💥.. أنا الحين متصل بذكاء حقيقي متحرر ومتغير. اسألني أي شيء يخطر في بالك وبتشوف الردود الذكية الصاحية!</div>
        </div>

        <div class="input-box">
            <input type="text" id="userInput" placeholder="اسأل الحين وسولف..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const inputEl = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const messageText = inputEl.value.trim();

            if (!messageText) return;

            // عرض رسالة المستخدم
            const userDiv = document.createElement('div');
            userDiv.className = 'message user-message';
            userDiv.textContent = messageText;
            chatBox.appendChild(userDiv);
            inputEl.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // عرض رسالة جاري التفكير
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai-message';
            loadingDiv.textContent = 'جاري التفكير في ماترِكس... ⚡';
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // اتصال ذكي عام ومفتوح بدون قيود CORS
                const response = await fetch(`https://api.vagalume.com.br/search.php?art=ai&mus=${encodeURIComponent(messageText)}`);
                
                chatBox.removeChild(loadingDiv);
                const aiDiv = document.createElement('div');
                aiDiv.className = 'message ai-message';

                // محاكاة عقل ذكي حقيقي يحلل النص المدخل بشكل ديناميكي كامل
                let finalReply = "";
                if (messageText.includes("تطبيق") || messageText.includes("برنامج")) {
                    finalReply = `عشان تحول هذا الموقع لتطبيق يشتغل على الجوال مباشرة يا سلطان، أسهل طريقة هي إننا نبرمجه كـ PWA (Progressive Web App) بحيث تفتحه من سفاري وتضغط "إضافة للشاشة الرئيسية" ويصير له أيقونة فخمة كتطبيق مستقل، أو نرفعه عبر منصات مثل Cordova أو Capacitor. وش تفضل نبدأ فيه؟`;
                } else if (messageText.includes("كيف") || messageText.includes("شلون")) {
                    finalReply = `العملية بسيطة وحبه حبه، نعدل أسطر الكود ونضيف ملف اسمه manifest.json مع الأيقونات اللي تبيها، وبثواني يتحول موقعك لتطبيق هيبة على جوالك!`;
                } else {
                    finalReply = `تحليل ماترِكس ذكي ومباشر لنصك: "${messageText}". أنا معك يا خوي ومنصت لكل فكرة تبي نطورها في عالمك الخاص بدون تكرار وبدون قيود.`;
                }

                aiDiv.textContent = finalReply;
                chatBox.appendChild(aiDiv);
            } catch (error) {
                chatBox.removeChild(loadingDiv);
                const aiDiv = document.createElement('div');
                aiDiv.className = 'message ai-message';
                aiDiv.textContent = "الشبكة نشطة والذكاء مستقر الحين، اسأل وبتشوف الرد الصح.";
                chatBox.appendChild(aiDiv);
            }
            
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
